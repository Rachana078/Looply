spring:
  application:
    name: looply
  profiles:
    active: dev
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  resend:
    api-key: ${RESEND_API_KEY}
  mail:
    from: ${MAIL_FROM:onboarding@resend.dev}
  base-url: ${BASE_URL:http://localhost:5173}

server:
  port: ${PORT:8080}
